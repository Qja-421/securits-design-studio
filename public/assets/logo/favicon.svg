<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a1a" stroke="#29ABE2" stroke-width="2"/>

  <!-- WiFi waves (arcs centred at bottom of Omega) -->
  <path d="M 20 22 A 16 16 0 0 1 44 22" fill="none" stroke="#29ABE2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 16 17 A 22 22 0 0 1 48 17" fill="none" stroke="#29ABE2" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Omega symbol (Ω) centred -->
  <text x="32" y="46"
        font-family="Georgia, serif"
        font-size="28"
        font-weight="bold"
        fill="#29ABE2"
        text-anchor="middle"
        dominant-baseline="auto">Ω</text>

  <!-- Accent dot (Orange) -->
  <circle cx="48" cy="16" r="4" fill="#F7941D"/>
</svg>
